<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Sửa Giao Dịch')}"></head>

<body>

    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="m-0 fw-bold text-primary">Sửa Giao Dịch</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/transaction/edit/{id}(id=${transaction.id})}" th:object="${transaction}"
                            method="post">
                            <!-- Loại giao dịch (Radio) -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Loại Giao Dịch</label>
                                <div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{type}"
                                            id="editTypeExpense" value="EXPENSE" required>
                                        <label class="form-check-label text-danger" for="editTypeExpense">Thiệt hại
                                            (Chi)</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{type}"
                                            id="editTypeIncome" value="INCOME">
                                        <label class="form-check-label text-success" for="editTypeIncome">Bỏ vào
                                            (Thu)</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Số tiền -->
                            <div class="mb-3">
                                <label for="editAmount" class="form-label fw-bold">Số tiền (VNĐ)</label>
                                <input type="number" class="form-control" id="editAmount" th:field="*{amount}"
                                    min="1000" step="500" placeholder="VD: 50000" required>
                            </div>

                            <!-- Ngày giao dịch -->
                            <div class="mb-3">
                                <label for="editDate" class="form-label fw-bold">Ngày thực hiện</label>
                                <input type="date" class="form-control" id="editDate" th:field="*{date}">
                                <div class="form-text">Nếu để trống, sẽ tự động áp dụng ngày hôm nay.</div>
                            </div>

                            <!-- Ghi chú/Mô tả -->
                            <div class="mb-3">
                                <label for="editDesc" class="form-label fw-bold">Mô tả tóm tắt</label>
                                <input type="text" class="form-control" id="editDesc" th:field="*{description}"
                                    placeholder="VD: Ăn sáng tô bún riêu" maxlength="255" required>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a th:href="@{/}" class="btn btn-secondary">Hủy bỏ</a>
                                <button type="submit" class="btn btn-primary">Cập nhật Giao dịch</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
