<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Đăng nhập')}"></head>

<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                                style="width: 64px; height: 64px;">
                                <i class="bi bi-wallet2 fs-2"></i>
                            </div>
                            <h4 class="fw-bold">Expense Tracker</h4>
                            <p class="text-muted">Đăng nhập để quản lý chi tiêu</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger" role="alert">
                            Sai tài khoản hoặc mật khẩu!
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success" role="alert">
                            Bạn đã đăng xuất thành công.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold">Tài khoản</label>
                                <input type="text" class="form-control" id="username" name="username" required autofocus
                                    placeholder="user">
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Mật khẩu</label>
                                <input type="password" class="form-control" id="password" name="password" required
                                    placeholder="password">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold">Đăng nhập</button>
                            </div>
                        </form>

                        <div class="mt-4 text-center text-muted small">
                            <p>MVP Version - Default: user / password</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
